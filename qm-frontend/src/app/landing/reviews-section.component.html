<section class="reviews" id="reviews" aria-label="Reviews">
  <div class="container">
    <h2 class="section-title">{{ title }}</h2>
    <p class="section-description">{{ description }}</p>

    <div class="grid" role="list">
      @for (r of reviews; track r.name) {
        <article class="review" role="listitem">
          <div class="review-stars" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="star" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.1 6.7 7.3 1-5.3 5.1 1.3 7.2L12 18.9 5.6 22l1.3-7.2L1.6 9.7l7.3-1L12 2z" />
            </svg>
            <svg viewBox="0 0 24 24" class="star" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.1 6.7 7.3 1-5.3 5.1 1.3 7.2L12 18.9 5.6 22l1.3-7.2L1.6 9.7l7.3-1L12 2z" />
            </svg>
            <svg viewBox="0 0 24 24" class="star" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.1 6.7 7.3 1-5.3 5.1 1.3 7.2L12 18.9 5.6 22l1.3-7.2L1.6 9.7l7.3-1L12 2z" />
            </svg>
            <svg viewBox="0 0 24 24" class="star" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.1 6.7 7.3 1-5.3 5.1 1.3 7.2L12 18.9 5.6 22l1.3-7.2L1.6 9.7l7.3-1L12 2z" />
            </svg>
            <svg viewBox="0 0 24 24" class="star" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l3.1 6.7 7.3 1-5.3 5.1 1.3 7.2L12 18.9 5.6 22l1.3-7.2L1.6 9.7l7.3-1L12 2z" />
            </svg>
          </div>
          <h3 class="review-title">{{ r.title }}</h3>
          <p class="review-body">{{ r.body }}</p>
          <p class="review-name">— {{ r.name }}</p>
        </article>
      }
    </div>
  </div>
</section>
