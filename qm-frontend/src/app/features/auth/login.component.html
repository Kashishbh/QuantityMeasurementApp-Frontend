<div class="auth-page">
  <div class="card" role="region" aria-labelledby="login-title">
    <h1 id="login-title" class="title">Login</h1>
    <p class="subtitle">
      Sign in with email and password to access saved history. Guests can use the converter without an account;
      history requires signing in.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" formControlName="email" autocomplete="username" />
      </div>
      <div class="field">
        <label for="login-pass">Password</label>
        <div class="password-wrap">
          <input
            id="login-pass"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>
      @if (errorMessage) {
        <div class="alert" role="alert">{{ errorMessage }}</div>
      }
      <button type="submit" class="btn-primary full" [disabled]="submitting()">
        {{ submitting() ? 'Signing in…' : 'Login' }}
      </button>
    </form>

    <p class="divider" aria-hidden="true">or</p>
    <button type="button" class="btn-google full" [disabled]="submitting()" (click)="signInWithGoogle()">
      Continue with Google
    </button>

    <button type="button" class="btn-secondary full" [disabled]="submitting()" (click)="guestLogin()">
      Continue as guest
    </button>

    <p class="footer-line">
      No account?
      <a routerLink="/signup" [queryParams]="route.snapshot.queryParams">Sign up</a>
    </p>
  </div>
</div>
