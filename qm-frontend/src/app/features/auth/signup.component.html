<div class="auth-page">
  <div class="card" role="region" aria-labelledby="signup-title">
    <h1 id="signup-title" class="title">Create account</h1>
    <p class="subtitle">Create your account. Your name appears in the header when signed in.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="su-name">Name</label>
        <input id="su-name" type="text" formControlName="name" autocomplete="name" />
      </div>
      <div class="field">
        <label for="su-email">Email</label>
        <input id="su-email" type="email" formControlName="email" autocomplete="email" />
      </div>
      <div class="field">
        <label for="su-pass">Password</label>
        <div class="password-wrap">
          <input
            id="su-pass"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>
      <div class="field">
        <label for="su-confirm">Confirm password</label>
        <input
          id="su-confirm"
          type="password"
          formControlName="confirm"
          autocomplete="new-password"
        />
      </div>
      @if (form.errors?.['mismatch'] && (form.touched || form.dirty)) {
        <div class="alert" role="alert">Passwords do not match.</div>
      }
      @if (errorMessage) {
        <div class="alert" role="alert">{{ errorMessage }}</div>
      }
      <button type="submit" class="btn-primary full" [disabled]="submitting()">
        {{ submitting() ? 'Creating account…' : 'Sign up' }}
      </button>
    </form>

    <p class="divider" aria-hidden="true">or</p>
    <button type="button" class="btn-google full" [disabled]="submitting()" (click)="signInWithGoogle()">
      Continue with Google
    </button>

    <p class="footer-line">
      Already have an account?
      <a routerLink="/login" [queryParams]="route.snapshot.queryParams">Login</a>
    </p>
  </div>
</div>
